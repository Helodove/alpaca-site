<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg" cx="45%" cy="38%" r="62%">
      <stop offset="0%" stop-color="#72C9ED"/>
      <stop offset="100%" stop-color="#38AED4"/>
    </radialGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="0.4"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bg)"/>

  <!-- Cloud base -->
  <circle cx="55"  cy="170" r="22" fill="white"/>
  <circle cx="82"  cy="163" r="27" fill="white"/>
  <circle cx="118" cy="163" r="27" fill="white"/>
  <circle cx="145" cy="170" r="22" fill="white"/>
  <rect   x="55"   y="170" width="90" height="20" fill="white"/>

  <!-- Body fluffy sides -->
  <circle cx="74"  cy="133" r="16" fill="white"/>
  <circle cx="126" cy="133" r="16" fill="white"/>
  <!-- Body main -->
  <ellipse cx="100" cy="138" rx="28" ry="22" fill="white"/>

  <!-- Neck -->
  <path d="M91,130 Q89,108 91,88 L109,88 Q111,108 109,130 Z" fill="white"/>
  <ellipse cx="100" cy="129" rx="15" ry="9" fill="white"/>

  <!-- Head -->
  <ellipse cx="100" cy="78" rx="19" ry="17" fill="white"/>

  <!-- Fluffy head top -->
  <circle cx="87"  cy="63" r="11" fill="white"/>
  <circle cx="100" cy="59" r="13" fill="white"/>
  <circle cx="113" cy="63" r="11" fill="white"/>

  <!-- Left ear -->
  <path d="M83,65 Q77,47 84,38 Q89,50 87,65 Z" fill="white"/>
  <path d="M83.5,63 Q79,50 84.5,42 Q88,52 86.5,63 Z" fill="#FFCECE" opacity="0.85"/>

  <!-- Right ear -->
  <path d="M117,65 Q123,47 116,38 Q111,50 113,65 Z" fill="white"/>
  <path d="M116.5,63 Q121,50 115.5,42 Q112,52 113.5,63 Z" fill="#FFCECE" opacity="0.85"/>

  <!-- Eyes -->
  <circle cx="92"  cy="76" r="5" fill="#1C1C2E"/>
  <circle cx="108" cy="76" r="5" fill="#1C1C2E"/>
  <circle cx="94"  cy="74" r="1.8" fill="white"/>
  <circle cx="110" cy="74" r="1.8" fill="white"/>

  <!-- Snout -->
  <ellipse cx="100" cy="87" rx="8" ry="6" fill="#F5DDD5"/>
  <circle  cx="97"  cy="88.5" r="1.6" fill="#D4A0A0" opacity="0.75"/>
  <circle  cx="103" cy="88.5" r="1.6" fill="#D4A0A0" opacity="0.75"/>
  <!-- Smile -->
  <path d="M96,91 Q100,94.5 104,91" stroke="#C88888" stroke-width="1.4" fill="none" stroke-linecap="round"/>

  <!-- Front legs -->
  <rect x="83"  y="153" width="10" height="22" rx="5" fill="white"/>
  <rect x="107" y="153" width="10" height="22" rx="5" fill="white"/>
</svg>
