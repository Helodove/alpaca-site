<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#1E4A6E"/>
      <stop offset="100%" stop-color="#0E2A44"/>
    </linearGradient>
    <linearGradient id="counter" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#2A6090"/>
      <stop offset="100%" stop-color="#1A4068"/>
    </linearGradient>
    <linearGradient id="marble" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#E8F6FD"/>
      <stop offset="40%"  stop-color="#F2FBFF"/>
      <stop offset="70%"  stop-color="#D8EEFA"/>
      <stop offset="100%" stop-color="#E4F4FC"/>
    </linearGradient>
    <filter id="glow4">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft4">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <!-- Dark blue background -->
  <rect width="600" height="450" fill="url(#bg4)"/>

  <!-- Back wall tiles -->
  <rect x="0" y="0" width="600" height="260" fill="#1C4060"/>
  <!-- Tile grid -->
  <g stroke="rgba(255,255,255,0.06)" stroke-width="1">
    <line x1="0"   y1="60"  x2="600" y2="60"/>
    <line x1="0"   y1="120" x2="600" y2="120"/>
    <line x1="0"   y1="180" x2="600" y2="180"/>
    <line x1="0"   y1="240" x2="600" y2="240"/>
    <line x1="60"  y1="0"   x2="60"  y2="260"/>
    <line x1="120" y1="0"   x2="120" y2="260"/>
    <line x1="180" y1="0"   x2="180" y2="260"/>
    <line x1="240" y1="0"   x2="240" y2="260"/>
    <line x1="300" y1="0"   x2="300" y2="260"/>
    <line x1="360" y1="0"   x2="360" y2="260"/>
    <line x1="420" y1="0"   x2="420" y2="260"/>
    <line x1="480" y1="0"   x2="480" y2="260"/>
    <line x1="540" y1="0"   x2="540" y2="260"/>
  </g>

  <!-- Alpaca logo on wall (lit sign) -->
  <circle cx="300" cy="110" r="50" fill="#4BB8E8" opacity="0.2" filter="url(#soft4)"/>
  <circle cx="300" cy="110" r="38" fill="#1E5A80" stroke="#4BB8E8" stroke-width="2" opacity="0.9"/>
  <text x="300" y="103" text-anchor="middle" font-family="sans-serif" font-size="28" fill="white">🦙</text>
  <text x="300" y="128" text-anchor="middle" font-family="Nunito,sans-serif" font-weight="900" font-size="13" fill="white" letter-spacing="3">ALPACA</text>
  <!-- Logo glow -->
  <circle cx="300" cy="110" r="48" fill="none" stroke="#4BB8E8" stroke-width="1" opacity="0.4"/>

  <!-- Shelf above counter -->
  <rect x="0" y="200" width="600" height="14" rx="3" fill="#3A7AA8"/>
  <rect x="0" y="200" width="600" height="5"  rx="2" fill="#5A9AC8"/>

  <!-- Tea jars on shelf -->
  <g fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)" stroke-width="1">
    <!-- Jar 1 -->
    <rect x="30"  y="158" width="34" height="44" rx="5"/>
    <ellipse cx="47" cy="158" rx="17" ry="6"/>
    <rect x="36"  y="150" width="22" height="10" rx="3"/>
    <!-- Jar 2 -->
    <rect x="80"  y="162" width="30" height="40" rx="5"/>
    <ellipse cx="95" cy="162" rx="15" ry="5"/>
    <rect x="85"  y="155" width="20" height="9" rx="3"/>
    <!-- Jar 3 green tea -->
    <rect x="126" y="155" width="36" height="47" rx="5" fill="rgba(60,160,80,0.25)"/>
    <ellipse cx="144" cy="155" rx="18" ry="6" fill="rgba(60,160,80,0.3)"/>
    <rect x="132" y="147" width="24" height="10" rx="3" fill="rgba(60,160,80,0.3)"/>
    <!-- Jar 4 -->
    <rect x="178" y="160" width="32" height="42" rx="5"/>
    <ellipse cx="194" cy="160" rx="16" ry="5"/>
    <rect x="184" y="153" width="20" height="9" rx="3"/>
    <!-- Jar 5 matcha -->
    <rect x="226" y="156" width="30" height="46" rx="5" fill="rgba(80,180,60,0.25)"/>
    <ellipse cx="241" cy="156" rx="15" ry="5" fill="rgba(80,180,60,0.3)"/>
    <!-- Jar 6 pink -->
    <rect x="272" y="162" width="28" height="40" rx="5" fill="rgba(255,120,160,0.2)"/>
    <ellipse cx="286" cy="162" rx="14" ry="5" fill="rgba(255,120,160,0.25)"/>
    <!-- Jar 7 -->
    <rect x="316" y="158" width="32" height="44" rx="5"/>
    <ellipse cx="332" cy="158" rx="16" ry="6"/>
    <!-- Jar 8 -->
    <rect x="364" y="162" width="28" height="40" rx="5"/>
    <ellipse cx="378" cy="162" rx="14" ry="5"/>
  </g>

  <!-- Counter body -->
  <rect x="0" y="214" width="600" height="236" fill="url(#counter)"/>
  <!-- Counter top (marble) -->
  <rect x="0" y="214" width="600" height="36" fill="url(#marble)"/>
  <!-- Marble veins -->
  <path d="M80,220 Q200,226 280,218 Q360,210 450,225" stroke="rgba(180,210,230,0.6)" stroke-width="1.5" fill="none"/>
  <path d="M150,240 Q250,235 350,245 Q440,250 540,238" stroke="rgba(180,210,230,0.4)" stroke-width="1" fill="none"/>
  <!-- Counter highlight -->
  <rect x="0" y="214" width="600" height="3" fill="rgba(255,255,255,0.5)"/>
  <!-- Counter front panel with subtle detail -->
  <rect x="0" y="250" width="600" height="4" rx="0" fill="rgba(255,255,255,0.08)"/>
  <!-- Counter bottom glow panels -->
  <rect x="20"  y="360" width="100" height="6" rx="3" fill="#4BB8E8" opacity="0.3"/>
  <rect x="160" y="360" width="80"  height="6" rx="3" fill="#4BB8E8" opacity="0.3"/>
  <rect x="290" y="360" width="120" height="6" rx="3" fill="#4BB8E8" opacity="0.3"/>
  <rect x="460" y="360" width="90"  height="6" rx="3" fill="#4BB8E8" opacity="0.3"/>

  <!-- Equipment on counter -->
  <!-- Tea shaker machine -->
  <g transform="translate(60, 225)">
    <rect x="0" y="0" width="60" height="90" rx="8" fill="#2A5A80"/>
    <rect x="5" y="5" width="50" height="30" rx="5" fill="#1A3A5A"/>
    <!-- Screen -->
    <rect x="8" y="7" width="44" height="26" rx="3" fill="#0A2030" opacity="0.8"/>
    <!-- Screen glow lines -->
    <line x1="12" y1="15" x2="48" y2="15" stroke="#4BB8E8" stroke-width="1.5" opacity="0.7"/>
    <line x1="12" y1="21" x2="40" y2="21" stroke="#4BB8E8" stroke-width="1"   opacity="0.5"/>
    <line x1="12" y1="27" x2="44" y2="27" stroke="#4BB8E8" stroke-width="1"   opacity="0.5"/>
    <!-- Buttons -->
    <circle cx="14" cy="46" r="5" fill="#3A9AC8"/>
    <circle cx="30" cy="46" r="5" fill="#4BB8E8"/>
    <circle cx="46" cy="46" r="5" fill="#3A9AC8"/>
    <!-- Cup holder -->
    <ellipse cx="30" cy="80" rx="18" ry="6" fill="#1A3A5A"/>
  </g>

  <!-- Drink dispenser -->
  <g transform="translate(180, 220)">
    <rect x="0"  y="0"  width="50" height="110" rx="6" fill="#2A5A80"/>
    <rect x="8"  y="8"  width="34" height="60"  rx="4" fill="#1E4060" opacity="0.9"/>
    <!-- Dispenser nozzles -->
    <rect x="16" y="68" width="6"  height="18" rx="2" fill="#3A8AB0"/>
    <rect x="28" y="68" width="6"  height="18" rx="2" fill="#3A8AB0"/>
    <!-- Tap -->
    <rect x="10" y="80" width="30" height="8"  rx="4" fill="#4BB8E8" opacity="0.6"/>
    <!-- Drip tray -->
    <rect x="4"  y="92" width="42" height="10" rx="3" fill="#1A3A5A"/>
  </g>

  <!-- 2 finished cups on counter -->
  <g transform="translate(320, 225)">
    <ellipse cx="24" cy="12" rx="20" ry="6" fill="#E8C0D0"/>
    <rect x="4"  y="12" width="40" height="5" rx="2" fill="#D0A0B8"/>
    <path d="M4,17 L0,80 Q0,86 6,86 L42,86 Q48,86 48,80 L44,17 Z" fill="rgba(255,120,160,0.65)"/>
    <path d="M7,50 L3,80 Q3,84 8,84 L40,84 Q45,84 45,80 L41,50 Z" fill="rgba(255,255,255,0.3)"/>
    <circle cx="14" cy="76" r="6" fill="rgba(180,30,80,0.8)"/>
    <circle cx="24" cy="80" r="5" fill="rgba(180,30,80,0.8)"/>
    <circle cx="34" cy="75" r="6" fill="rgba(180,30,80,0.8)"/>
    <rect x="36" y="-28" width="5" height="48" rx="2" fill="white" opacity="0.8"/>
    <path d="M8,17 L5,55" stroke="rgba(255,255,255,0.4)" stroke-width="4" stroke-linecap="round"/>
  </g>

  <g transform="translate(388, 228)">
    <ellipse cx="24" cy="12" rx="20" ry="6" fill="#B0E0C0"/>
    <rect x="4"  y="12" width="40" height="5" rx="2" fill="#90C8A0"/>
    <path d="M4,17 L0,80 Q0,86 6,86 L42,86 Q48,86 48,80 L44,17 Z" fill="rgba(60,180,80,0.65)"/>
    <path d="M7,48 L3,80 Q3,84 8,84 L40,84 Q45,84 45,80 L41,48 Z" fill="rgba(255,255,255,0.3)"/>
    <circle cx="14" cy="76" r="6" fill="rgba(20,100,40,0.8)"/>
    <circle cx="24" cy="80" r="5" fill="rgba(20,100,40,0.8)"/>
    <circle cx="34" cy="75" r="6" fill="rgba(20,100,40,0.8)"/>
    <rect x="16" y="-32" width="5" height="52" rx="2" fill="white" opacity="0.8"/>
    <path d="M8,17 L5,50" stroke="rgba(255,255,255,0.4)" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Subtle blue glow from below counter (ambient LED) -->
  <ellipse cx="300" cy="450" rx="320" ry="40" fill="#4BB8E8" opacity="0.12" filter="url(#soft4)"/>
</svg>
